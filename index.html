<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeanBuilds</title>
  <meta name="description" content="SeanBuilds.io — building things that matter." />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #f97316;
      --text: #f5f5f5;
      --muted: #888888;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(249, 115, 22, 0.1);
      border: 1px solid rgba(249, 115, 22, 0.3);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    h1 span {
      color: var(--accent);
    }

    p.tagline {
      font-size: 1.125rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.75rem 1.75rem;
      border-radius: 0.5rem;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }

    .cta:hover {
      opacity: 0.85;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Coming Soon</div>
    <h1>Sean<span>Builds</span></h1>
    <p class="tagline">Building things that matter — one project at a time.</p>
    <a class="cta" href="mailto:hello@seanbuilds.io">Get in touch</a>
  </div>

  <footer>
    <p>&copy; 2026 <a href="https://seanbuilds.io">SeanBuilds.io</a>. All rights reserved.</p>
  </footer>
</body>
</html>
